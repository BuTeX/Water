services:
  - type: web
    runtime: docker
    name: water-payments
    region: frankfurt
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "4173"
      - key: DB_PATH
        value: /data/water.sqlite
      - key: ADMIN_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: TZ
        value: Europe/Moscow
    disk:
      name: water-data
      mountPath: /data
      sizeGB: 1
