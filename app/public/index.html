<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вода: общий баланс</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="dashboard">
    <header class="topbar">
      <a class="brand" href="/">Вода</a>
      <nav class="nav">
        <a href="/">Дашборд</a>
      </nav>
    </header>

    <main class="shell">
      <section class="dashboard-hero">
        <div>
          <p class="eyebrow">Общая скважина</p>
          <h1>Общий баланс воды</h1>
          <p id="updatedAt" class="muted"></p>
        </div>
        <div id="balanceHero" class="hero-balance"></div>
      </section>

      <section class="street-attention-layout">
        <section class="panel street-panel">
          <div class="panel-head">
            <h2>Улица Уютная</h2>
            <span id="asOfMonth" class="pill"></span>
          </div>
          <div id="streetMap" class="street-map"></div>
        </section>

        <section class="panel attention-panel">
          <div class="panel-head">
            <h2>Требуют внимания</h2>
          </div>
          <div id="priorityList" class="compact-list"></div>
        </section>
      </section>

      <section class="dashboard-layout">
        <section class="panel primary-panel">
          <div class="panel-head">
            <h2>Сводка</h2>
          </div>
          <section id="dashboardStats" class="stats-grid stats-grid-compact"></section>
          <section id="statusSummary" class="status-grid"></section>
          <div id="housesOverview" class="summary-strip"></div>
        </section>

        <aside class="side-stack">
          <section class="panel">
            <div class="panel-head">
              <h2>Последние расходы</h2>
            </div>
            <div id="expensesList" class="compact-list"></div>
          </section>
        </aside>
      </section>

      <section class="panel details-panel">
        <div class="panel-head">
          <h2>Подробно по домам</h2>
        </div>
        <div id="housesTable" class="table-wrap"></div>
        <div id="housesCards" class="house-card-list"></div>
      </section>
    </main>

    <script src="/client.js" type="module"></script>
  </body>
</html>
