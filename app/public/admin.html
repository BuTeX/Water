<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Казна водоснабжения на улице Уютная: админка</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="admin">
    <header class="topbar">
      <a class="brand" href="/">Казна водоснабжения на улице Уютная</a>
      <nav class="nav">
        <button id="logoutButton" class="link-button hidden">Выйти</button>
      </nav>
    </header>

    <main class="shell">
      <section class="page-head">
        <div>
          <p class="eyebrow">Администратор</p>
          <h1>Учет платежей</h1>
        </div>
      </section>

      <section id="loginPanel" class="panel narrow">
        <h2>Вход</h2>
        <form id="loginForm" class="form-grid">
          <label>
            Пароль
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Войти</button>
        </form>
      </section>

      <section id="adminPanel" class="hidden">
        <div id="adminStats" class="stats-grid"></div>

        <section class="section-grid">
          <div class="panel">
            <div class="panel-head">
              <h2>Новый платеж</h2>
            </div>
            <form id="paymentForm" class="form-grid"></form>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>Новый расход</h2>
            </div>
            <form id="expenseForm" class="form-grid"></form>
          </div>
        </section>

        <section class="section-grid">
          <div class="panel">
            <div class="panel-head">
              <h2>Дом</h2>
            </div>
            <form id="houseForm" class="form-grid"></form>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>Экспорт</h2>
            </div>
            <div class="button-row">
              <a class="button" href="/api/export/houses.csv">Дома CSV</a>
              <a class="button" href="/api/export/payments.csv">Платежи CSV</a>
              <a class="button" href="/api/export/expenses.csv">Расходы CSV</a>
            </div>
            <form id="databaseForm" class="form-grid database-form">
              <a class="button database-download full" href="/api/admin/database" download>Скачать базу SQLite</a>
              <label class="full">
                База SQLite
                <input name="database" type="file" accept=".sqlite,.db,application/x-sqlite3" required />
              </label>
              <button type="submit" class="full">Загрузить базу</button>
              <p id="databaseStatus" class="muted full"></p>
            </form>
            <div id="telegramStatus" class="telegram-status"></div>
          </div>
        </section>

        <section class="section-grid telegram-admin-grid">
          <div class="panel">
            <div class="panel-head">
              <h2>Платежи из Telegram</h2>
            </div>
            <div id="telegramClaims" class="stack"></div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>Пользователи Telegram</h2>
            </div>
            <form id="telegramUserForm" class="form-grid telegram-user-form"></form>
            <div id="telegramUsers" class="table-wrap"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Последние 50 сообщений Telegram</h2>
          </div>
          <div id="telegramMessages" class="telegram-message-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Дома</h2>
          </div>
          <div id="adminHouses" class="table-wrap"></div>
        </section>

        <section class="section-grid">
          <div class="panel">
            <div class="panel-head">
              <h2>История платежей</h2>
            </div>
            <div id="adminPayments" class="stack"></div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>История расходов</h2>
            </div>
            <div id="adminExpenses" class="stack"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="/client.js" type="module"></script>
  </body>
</html>
